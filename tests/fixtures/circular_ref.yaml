openapi: 3.0.0
info:
  title: Circular Reference API
  version: 1.0.0
paths:
  /nodes:
    get:
      summary: List nodes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Node"
components:
  schemas:
    Node:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        name:
          type: string
        children:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        parent:
          $ref: "#/components/schemas/Node"
    Category:
      type: object
      properties:
        name:
          type: string
        subcategories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        items:
          type: array
          items:
            $ref: "#/components/schemas/CategoryItem"
    CategoryItem:
      type: object
      properties:
        title:
          type: string
        category:
          $ref: "#/components/schemas/Category"
